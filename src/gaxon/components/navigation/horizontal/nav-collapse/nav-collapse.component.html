<a class="nav-link dt-side-nav__arrow" (click)="toggleOpen($event)" [ngClass]="{active:isOpen}">
  <ng-container *ngTemplateOutlet="itemContent"></ng-container>
</a>

<ng-template #itemContent>
  @if (item.icon) {
    <gx-icon class="nav-link-icon" name="{{item.icon}}" size="xl" [fw]="true"></gx-icon>
  }
  @if (item.translate) {
    <span class="nav-text" [translate]="item.translate"></span>
  }
  @if (!item.translate) {
    <span class="nav-text">{{item.title}}</span>
  }
</ng-template>

<div class="sub-menu">
  @for (item of item.children; track item) {
    @if (item.type=='group') {
      <app-nav-horizontal-collapse [item]="item"></app-nav-horizontal-collapse>
    }
    @if (item.type=='collapse') {
      <app-nav-horizontal-collapse [item]="item"></app-nav-horizontal-collapse>
    }
    @if (item.type=='item') {
      <app-nav-horizontal-item [item]="item"></app-nav-horizontal-item>
    }
  }
</div>
