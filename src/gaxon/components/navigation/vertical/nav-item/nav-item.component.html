@if (item.url) {
  <a class="dt-side-nav__link" [routerLink]="[item.url]" routerLinkActive="active"
    [routerLinkActiveOptions]="{exact: item.exactMatch || false}">
    <ng-container *ngTemplateOutlet="itemTemplate"></ng-container>
  </a>
}

@if (item.function) {
  <span class="dt-side-nav__link" (click)="item.function()">
    <ng-container *ngTemplateOutlet="itemTemplate"></ng-container>
  </span>
}

<ng-template #itemTemplate>
  @if (item.icon) {
    <gx-icon name="{{item.icon}}" size="lg" [fw]="true"></gx-icon>
  }
  @if (item.translate) {
    <span class="dt-side-nav__text" [translate]="item.translate"></span>
  }
  @if (!item.translate) {
    <span class="dt-side-nav__text">{{item.title}}</span>
  }
</ng-template>
