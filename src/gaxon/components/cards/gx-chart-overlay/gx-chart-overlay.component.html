<!-- Chart Body -->
@if (chart) {
  <gx-chart
    class="dt-chart__body"
    chartClasses="rounded-bottom"
    [chartType]="chart.chartType"
    [datasets]="chart.datasets"
    [labels]="chart.labels"
    [colors]="chart.colors"
  [options]="chart.options"></gx-chart>
}
<!-- /chart body -->

<!-- Chart Overlay -->
<div class="dt-chart__overlay" [ngClass]="bodyClasses">
  @if (data.title) {
    <h6 class="title text-white text-uppercase">{{data.title}}</h6>
  }

  <div class="content-area">
    @if (data.heading) {
      <span class="d-inline-block mb-1 display-3 font-weight-500">{{data.heading}}</span>
    }
    <div class="d-flex align-items-center">
      @if (data.sub_heading) {
        <span class="d-inline-block mr-1">{{data.sub_heading}}</span>
      }
      @if (data.icon) {
        <gx-icon [name]="data.icon" class="f-10 mr-2"></gx-icon>
      }
      @if (data.tagline) {
        <span class="d-inline-block f-12">{{data.tagline}}</span>
      }
    </div>
  </div>

  <!-- Button -->
  <a href="javascript:void(0)" class="btn btn-outline-light dt-fab-btn size-25 action-btn" (click)="toggleOverlay()">
    <gx-icon name="stats2" size="xl"></gx-icon>
  </a>
  <!-- /button -->

  <!-- Button -->
  <a href="javascript:void(0)" class="btn btn-outline-light dt-fab-btn size-25 close-btn" (click)="toggleOverlay()">
    <gx-icon name="remove" size="lg"></gx-icon>
  </a>
  <!-- /button -->

</div>
<!-- /chart overlay -->
