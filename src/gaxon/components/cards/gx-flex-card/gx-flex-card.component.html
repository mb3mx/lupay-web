<!-- Card Stacked -->
<bs-card-body class="p-3">
  @if (data.badge) {
    <span class="badge badge-success mb-1 p-1">{{data.badge}}</span>
  }
  @if (data.title) {
    <h4 class="mb-1 text-truncate">{{data.title}}</h4>
  }
  @if (data.subtitle) {
    <span class="d-block f-12 text-truncate">{{data.subtitle}}</span>
  }
</bs-card-body>

<!-- Card Image -->
<div class="pr-4 d-flex align-items-center">
  <!-- Card Image -->
  <img class="img-fluid" [src]="data.media" alt="{{data.title}}">
  <!-- /card image -->
  <a [routerLink]="data.route" class="d-inline-block ml-5 text-body">
    <gx-icon name="chevrolet-right" size="xl"></gx-icon>
  </a>
</div>
<!-- /card image -->
