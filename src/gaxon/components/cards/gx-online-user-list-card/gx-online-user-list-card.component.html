<!-- List -->
<ul class="dt-list dt-list-sm dt-friend-list">
  <!-- List Item -->
  @for (user of userList; track user; let last = $last) {
    <li class="dt-list__item">
      <!-- User Information -->
      <a href="javascript:void(0)" class="card user-bg-card user-bg-card-sm mb-0"
        [ngStyle]="{'background-image': 'url(' + user.image + ')'}" [ngClass]="{'more-thumb':last}">
        @if (last) {
          <span class="count-number display-4">+22</span>
        }
        <!-- Dot Shape -->
        @if (!last) {
          <span class="dot-shape dot-shape-lg dt-status" status [statusCode]="user.status"></span>
        }
        <!-- /dot Shape -->
        @if (!last) {
          <span class="user-bg-card__info">
            <span class="dt-avatar-name f-10 mb-0">{{user.name}}</span>
          </span>
        }
      </a>
      <!-- /user information -->
    </li>
  }
  <!-- /list item -->
</ul>
<!-- /list -->
