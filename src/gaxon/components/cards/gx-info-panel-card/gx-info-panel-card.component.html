<card-header class="px-5 mb-4">
  <card-heading class="text-center">
    <div class="dt-separator-h-v1 mb-2"></div>
    <h3 class="mb-0">{{data.title}}</h3>
  </card-heading>
</card-header>

<card-body class="text-center">
  <div class="mx-n8 mb-n8">
    @if (data.image) {
      <img class="w-100" [src]="data.image"
        alt="{{data.title}}">
    }
  </div>
</card-body>

@if (data.actionLabel) {
  <a [routerLink]="data.actionRoute" class="btn btn-primary btn-block rounded-0 text-uppercase">{{data.actionLabel}}</a>
}
