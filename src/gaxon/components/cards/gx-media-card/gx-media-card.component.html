<!-- Card Image -->
@if (data.media) {
  <img class="card-img-top" [src]="data.media" alt="{{data.title || 'Media Image'}}">
}
<!-- /card image -->

<ng-content></ng-content>

<!-- Card Body -->
<bs-card-body [ngClass]="bodyClasses">

  @if (data.title) {
    <h4 class="mb-1">{{data.title}}</h4>
  }

  <!-- Card Text-->
  <p class="card-text" [ngClass]="textStyle" [innerHTML]="data.content"></p>
  <!-- /card text-->

  <!-- Card Link -->
  @if (data.actionLabel) {
    <a [routerLink]="data.actionRoute" class="card-link " [ngClass]="data.actionStyle">{{data.actionLabel}}</a>
  }
  <!-- /card link -->

</bs-card-body>
